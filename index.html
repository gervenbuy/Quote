<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>電商神助手 - 專業報價工具</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- 引入 Phosphor Icons (替代 Lucide) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        /* 隱藏預設的 input 箭頭 */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        /* A4 預覽區樣式 */
        #quotation-preview {
            min-height: 1131px;
            padding: 40px 50px;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">

<div class="min-h-screen flex flex-col md:flex-row">
    <!-- 左側：編輯區 -->
    <div class="w-full md:w-1/2 lg:w-5/12 bg-white shadow-xl z-10 overflow-y-auto h-screen p-6 border-r border-gray-200">
        <div class="flex items-center justify-between mb-6 pb-4 border-b border-gray-200">
            <div class="flex items-center gap-2 text-blue-600">
                <i class="ph ph-file-text text-2xl"></i>
                <h1 class="text-xl font-bold">電商神助手 報價工具</h1>
            </div>
            <button id="btnExport" class="flex items-center gap-2 px-4 py-2 rounded-lg text-white font-medium transition-colors bg-blue-600 hover:bg-blue-700">
                <i class="ph ph-download text-lg"></i>
                <span id="exportText">輸出圖片</span>
            </button>
        </div>

        <div class="space-y-8">
            <!-- 基本設定 -->
            <section>
                <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-gray-800">
                    <i class="ph ph-calendar text-blue-500 text-xl"></i> 報價單設定
                </h2>
                <div class="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded-lg">
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">報價單號</label>
                        <input type="text" id="meta-quoteNumber" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">報價日期</label>
                        <input type="date" id="meta-date" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">有效期限</label>
                        <input type="date" id="meta-validUntil" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3 justify-center">
                        <label class="text-sm font-medium text-gray-700 mb-2">稅額計算</label>
                        <div class="flex items-center gap-4">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="tax" value="true" checked class="w-4 h-4 text-blue-600">
                                <span class="text-sm">含稅 (5%)</span>
                            </label>
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="radio" name="tax" value="false" class="w-4 h-4 text-blue-600">
                                <span class="text-sm">未稅</span>
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 客戶資訊 (甲方) -->
            <section>
                <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-gray-800">
                    <i class="ph ph-user text-blue-500 text-xl"></i> 客戶資訊 (甲方)
                </h2>
                <div class="grid grid-cols-2 gap-x-4">
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">公司名稱 (選填)</label>
                        <input type="text" id="buyer-company" placeholder="客戶公司全名" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">統一編號 (選填)</label>
                        <input type="text" id="buyer-taxId" placeholder="8碼數字" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3 col-span-2">
                        <label class="text-sm font-medium text-gray-700 mb-1">聯絡地址 (選填)</label>
                        <input type="text" id="buyer-address" placeholder="客戶公司或聯絡地址" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">負責人 (選填)</label>
                        <input type="text" id="buyer-owner" placeholder="負責人姓名" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">聯絡人/姓名 (必填)</label>
                        <input type="text" id="buyer-contact" placeholder="專案聯絡人" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">聯絡電話 (必填)</label>
                        <input type="text" id="buyer-phone" placeholder="電話或手機" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>
            </section>

            <!-- 我方資訊 (乙方) -->
            <section>
                <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-gray-800">
                    <i class="ph ph-briefcase text-blue-500 text-xl"></i> 我方資訊 (乙方)
                </h2>
                <div class="grid grid-cols-2 gap-x-4">
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">公司/品牌名稱 (選填)</label>
                        <input type="text" id="seller-company" value="電商神助手" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">統一編號 (選填)</label>
                        <input type="text" id="seller-taxId" placeholder="選填" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3 col-span-2">
                        <label class="text-sm font-medium text-gray-700 mb-1">聯絡地址 (選填)</label>
                        <input type="text" id="seller-address" placeholder="選填" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">負責人 (選填)</label>
                        <input type="text" id="seller-owner" placeholder="選填" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">聯絡人/您的姓名 (必填)</label>
                        <input type="text" id="seller-contact" placeholder="您的姓名" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                    <div class="flex flex-col mb-3">
                        <label class="text-sm font-medium text-gray-700 mb-1">聯絡電話 (必填)</label>
                        <input type="text" id="seller-phone" placeholder="您的電話" class="px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>
                </div>
            </section>

            <!-- 報價項目 -->
            <section>
                <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-gray-800">
                    <i class="ph ph-gear text-blue-500 text-xl"></i> 報價項目
                </h2>
                
                <div id="itemsContainer">
                    <!-- 動態產生項目輸入區 -->
                </div>
                
                <button id="btnAddItem" class="w-full py-2 border-2 border-dashed border-blue-300 text-blue-600 rounded-lg flex items-center justify-center gap-2 hover:bg-blue-50 transition-colors font-medium text-sm mt-2">
                    <i class="ph ph-plus"></i> 新增項目
                </button>
            </section>

            <!-- 報價說明 -->
            <section class="pb-8">
                <h2 class="text-lg font-bold flex items-center gap-2 mb-4 text-gray-800">
                    <i class="ph ph-file-text text-blue-500 text-xl"></i> 報價說明與條款
                </h2>
                <textarea id="notes" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm h-32 leading-relaxed">
1. 本報價單有效期限為自報價日起算 14 天內。
2. 付款方式：確認報價後請先匯款 50% 訂金，專案結案交付後結清 50% 尾款。
3. 匯款資訊：
   銀行：(824) 連線銀行
   戶名：張凱軍
   帳號：111006760679
4. 本報價內容視為機密，請勿向第三方透露。</textarea>
            </section>
        </div>
    </div>

    <!-- 右側：預覽區 (A4 比例與樣式) -->
    <div class="w-full md:w-1/2 lg:w-7/12 bg-gray-200 overflow-y-auto h-screen p-4 md:p-8 flex justify-center items-start">
        
        <!-- 真實要被截圖的容器 -->
        <div id="quotation-preview" class="bg-white w-full max-w-[800px] shadow-sm flex flex-col relative">
            
            <!-- Header -->
            <div class="flex justify-between items-end border-b-2 border-blue-800 pb-4 mb-8">
                <div>
                    <h1 id="preview-title-company" class="text-3xl font-black text-gray-800 tracking-widest">電商神助手</h1>
                    <div id="preview-title-sub" class="text-gray-500 tracking-widest text-sm mt-1">報 價 單 QUOTATION</div>
                </div>
                <div class="text-right text-sm">
                    <div class="flex justify-end gap-2 mb-1"><span class="text-gray-500">報價單號：</span><span id="preview-quoteNumber" class="font-medium"></span></div>
                    <div class="flex justify-end gap-2 mb-1"><span class="text-gray-500">報價日期：</span><span id="preview-date"></span></div>
                    <div class="flex justify-end gap-2"><span class="text-gray-500">有效期限：</span><span id="preview-validUntil" class="text-red-600 font-medium"></span></div>
                </div>
            </div>

            <!-- Info Section -->
            <div class="flex flex-row justify-between mb-8 text-sm leading-relaxed">
                <!-- 買方資訊 -->
                <div class="w-[48%]">
                    <div class="bg-blue-800 text-white px-3 py-1.5 font-bold mb-3 rounded-sm flex items-center">
                        客戶資訊 (甲方)
                    </div>
                    <div class="grid grid-cols-[70px_1fr] gap-y-1.5 px-2" id="preview-buyer-info">
                        <!-- 動態產生買方資訊 -->
                    </div>
                </div>

                <!-- 賣方資訊 -->
                <div class="w-[48%]">
                    <div class="bg-gray-200 text-gray-800 px-3 py-1.5 font-bold mb-3 rounded-sm flex items-center">
                        報價單位 (乙方)
                    </div>
                    <div class="grid grid-cols-[70px_1fr] gap-y-1.5 px-2" id="preview-seller-info">
                         <!-- 動態產生賣方資訊 -->
                    </div>
                </div>
            </div>

            <!-- 產品明細表 -->
            <div class="mb-8 flex-grow">
                <table class="w-full border-collapse text-sm">
                    <thead>
                        <tr class="bg-blue-800 text-white">
                            <th class="py-3 px-4 text-left font-medium w-12 rounded-tl-sm">項次</th>
                            <th class="py-3 px-4 text-left font-medium">產品名稱 / 規格型號</th>
                            <th class="py-3 px-4 text-right font-medium w-16">數量</th>
                            <th class="py-3 px-4 text-center font-medium w-16">單位</th>
                            <th class="py-3 px-4 text-right font-medium w-28">單價</th>
                            <th class="py-3 px-4 text-right font-medium w-28 rounded-tr-sm">小計</th>
                        </tr>
                    </thead>
                    <tbody id="preview-items-tbody">
                        <!-- 動態產生表格內容 -->
                    </tbody>
                </table>

                <!-- 總計區塊 -->
                <div class="mt-4 flex justify-end">
                    <div class="w-64 border border-gray-200 rounded p-4 bg-gray-50">
                        <div class="flex justify-between mb-2 text-sm text-gray-600">
                            <span>銷售合計</span>
                            <span id="preview-subtotal">NT$ 0</span>
                        </div>
                        <div id="preview-tax-row" class="flex justify-between mb-2 text-sm text-gray-600">
                            <span>營業稅 (5%)</span>
                            <span id="preview-tax">NT$ 0</span>
                        </div>
                        <div class="border-t border-gray-300 my-2"></div>
                        <div class="flex justify-between items-end">
                            <span class="font-bold text-gray-800">總計金額</span>
                            <span id="preview-total" class="text-xl font-bold text-blue-800">NT$ 0</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 報價說明 -->
            <div class="mb-12">
                <h3 class="text-base font-bold text-gray-800 border-b-2 border-gray-200 pb-2 mb-3">報價說明與條款</h3>
                <div id="preview-notes" class="text-sm text-gray-600 leading-relaxed whitespace-pre-wrap"></div>
            </div>

            <!-- 簽名區 -->
            <div class="mt-auto pt-8 flex justify-between">
                <div class="w-[45%]">
                    <div class="text-sm font-bold text-gray-500 mb-8">客戶簽收 (簽名或蓋章)</div>
                    <div class="border-b border-gray-400"></div>
                    <div class="text-xs text-gray-400 mt-2">日期：　　年　　月　　日</div>
                </div>
                <div class="w-[45%]">
                    <div class="text-sm font-bold text-gray-500 mb-8">報價方確認 (簽名或蓋章)</div>
                    <div class="border-b border-gray-400"></div>
                    <div class="text-xs text-gray-400 mt-2">日期：　　年　　月　　日</div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // --- 輔助函數 ---
    const getToday = () => new Date().toISOString().split('T')[0];
    
    const getValidDate = () => {
        const d = new Date();
        d.setDate(d.getDate() + 14);
        return d.toISOString().split('T')[0];
    };

    const generateQuoteNumber = () => {
        const d = new Date();
        const year = d.getFullYear().toString().slice(-2);
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const random = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
        return `QT${year}${month}${day}-${random}`;
    };

    // --- 狀態 ---
    let state = {
        meta: {
            quoteNumber: generateQuoteNumber(),
            date: getToday(),
            validUntil: getValidDate(),
            hasTax: true
        },
        buyer: { company: '', taxId: '', address: '', owner: '', contact: '', phone: '' },
        seller: { company: '電商神助手', taxId: '', address: '', owner: '', contact: '', phone: '' },
        items: [
            { id: 1, name: '品牌官方網站建置', model: 'WEB-PRO', quantity: 1, unit: '式', price: 68000 }
        ],
        notes: document.getElementById('notes').value
    };

    // --- DOM 元素綁定與事件監聽 ---

    // 綁定雙向資料 (Input -> State -> Render)
    function bindInput(id, obj, prop) {
        const el = document.getElementById(id);
        if(!el) return;
        el.value = state[obj][prop];
        el.addEventListener('input', (e) => {
            state[obj][prop] = e.target.value;
            renderPreview();
        });
    }

    // 綁定 Meta
    bindInput('meta-quoteNumber', 'meta', 'quoteNumber');
    bindInput('meta-date', 'meta', 'date');
    bindInput('meta-validUntil', 'meta', 'validUntil');
    
    // 綁定稅率單選框
    document.querySelectorAll('input[name="tax"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            state.meta.hasTax = e.target.value === 'true';
            renderPreview();
        });
    });

    // 綁定 Buyer & Seller
    ['company', 'taxId', 'address', 'owner', 'contact', 'phone'].forEach(prop => {
        bindInput(`buyer-${prop}`, 'buyer', prop);
        bindInput(`seller-${prop}`, 'seller', prop);
    });

    // 綁定 Notes
    const notesEl = document.getElementById('notes');
    notesEl.addEventListener('input', (e) => {
        state.notes = e.target.value;
        renderPreview();
    });

    // --- 產品項目邏輯 ---
    const itemsContainer = document.getElementById('itemsContainer');
    
    function renderItemsEditor() {
        itemsContainer.innerHTML = '';
        state.items.forEach((item, index) => {
            const itemDiv = document.createElement('div');
            itemDiv.className = "bg-gray-50 p-4 rounded-lg mb-3 border border-gray-200 relative group";
            itemDiv.innerHTML = `
                <button onclick="removeItem(${item.id})" class="absolute top-2 right-2 text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" title="移除項目">
                    <i class="ph ph-trash text-lg"></i>
                </button>
                <div class="grid grid-cols-12 gap-3">
                    <div class="col-span-12 md:col-span-7">
                        <label class="text-xs font-medium text-gray-500 mb-1 block">產品/服務名稱</label>
                        <input type="text" class="w-full px-2 py-1.5 border rounded text-sm item-input" data-id="${item.id}" data-field="name" value="${item.name}" placeholder="例如：網站設計">
                    </div>
                    <div class="col-span-12 md:col-span-5">
                        <label class="text-xs font-medium text-gray-500 mb-1 block">型號/規格</label>
                        <input type="text" class="w-full px-2 py-1.5 border rounded text-sm item-input" data-id="${item.id}" data-field="model" value="${item.model}" placeholder="選填">
                    </div>
                    <div class="col-span-4 md:col-span-3">
                        <label class="text-xs font-medium text-gray-500 mb-1 block">數量</label>
                        <input type="number" min="1" class="w-full px-2 py-1.5 border rounded text-sm item-input" data-id="${item.id}" data-field="quantity" value="${item.quantity}">
                    </div>
                    <div class="col-span-4 md:col-span-3">
                        <label class="text-xs font-medium text-gray-500 mb-1 block">單位</label>
                        <input type="text" class="w-full px-2 py-1.5 border rounded text-sm item-input" data-id="${item.id}" data-field="unit" value="${item.unit}">
                    </div>
                    <div class="col-span-4 md:col-span-6">
                        <label class="text-xs font-medium text-gray-500 mb-1 block">單價 (NT$)</label>
                        <input type="number" class="w-full px-2 py-1.5 border rounded text-sm item-input" data-id="${item.id}" data-field="price" value="${item.price}">
                    </div>
                </div>
            `;
            itemsContainer.appendChild(itemDiv);
        });

        // 綁定項目輸入事件
        document.querySelectorAll('.item-input').forEach(input => {
            input.addEventListener('input', (e) => {
                const id = parseInt(e.target.dataset.id);
                const field = e.target.dataset.field;
                const value = e.target.value;
                const itemIndex = state.items.findIndex(i => i.id === id);
                if(itemIndex > -1) {
                    state.items[itemIndex][field] = value;
                    renderPreview();
                }
            });
        });
    }

    document.getElementById('btnAddItem').addEventListener('click', () => {
        state.items.push({ id: Date.now(), name: '', model: '', quantity: 1, unit: '件', price: 0 });
        renderItemsEditor();
        renderPreview();
    });

    window.removeItem = (id) => {
        if (state.items.length > 1) {
            state.items = state.items.filter(item => item.id !== id);
            renderItemsEditor();
            renderPreview();
        }
    };

    // --- 預覽區渲染邏輯 ---
    function renderPreview() {
        // Meta
        document.getElementById('preview-quoteNumber').textContent = state.meta.quoteNumber;
        document.getElementById('preview-date').textContent = state.meta.date;
        document.getElementById('preview-validUntil').textContent = state.meta.validUntil;

        // Title
        const titleCompany = document.getElementById('preview-title-company');
        const titleSub = document.getElementById('preview-title-sub');
        
        const mainTitle = state.seller.company ? state.seller.company : (state.seller.contact ? state.seller.contact : '報價單');
        titleCompany.textContent = mainTitle;
        titleSub.textContent = (state.seller.company || state.seller.contact) ? '報 價 單 QUOTATION' : 'QUOTATION';

        // Helper 產生 Info 行
        const createInfoRow = (label, value, isBold = false) => {
            if(!value) return '';
            const valClass = isBold ? 'font-bold text-gray-800' : 'text-gray-800';
            return `<span class="text-gray-500">${label}</span><span class="${valClass}">${value}</span>`;
        };
        const createInfoRowFallback = (label, value, fallback = '_________________') => {
             return `<span class="text-gray-500">${label}</span><span class="text-gray-800 font-medium">${value || fallback}</span>`;
        }

        // Buyer Info
        let buyerHtml = '';
        if(state.buyer.company) buyerHtml += createInfoRow('公司/單位', state.buyer.company, true);
        buyerHtml += createInfoRow('統一編號', state.buyer.taxId);
        buyerHtml += createInfoRow('聯絡地址', state.buyer.address);
        buyerHtml += createInfoRow('負責人', state.buyer.owner);
        buyerHtml += createInfoRowFallback('聯絡人', state.buyer.contact);
        buyerHtml += createInfoRowFallback('聯絡電話', state.buyer.phone);
        document.getElementById('preview-buyer-info').innerHTML = buyerHtml;

        // Seller Info
        let sellerHtml = '';
        if(state.seller.company) sellerHtml += createInfoRow('公司/單位', state.seller.company, true);
        sellerHtml += createInfoRow('統一編號', state.seller.taxId);
        sellerHtml += createInfoRow('聯絡地址', state.seller.address);
        sellerHtml += createInfoRow('負責人', state.seller.owner);
        sellerHtml += createInfoRowFallback('聯絡人', state.seller.contact);
        sellerHtml += createInfoRowFallback('聯絡電話', state.seller.phone);
        document.getElementById('preview-seller-info').innerHTML = sellerHtml;

        // Notes
        document.getElementById('preview-notes').textContent = state.notes || '無';

        // Items Table
        const tbody = document.getElementById('preview-items-tbody');
        tbody.innerHTML = '';
        let rawTotal = 0;

        state.items.forEach((item, index) => {
            const qty = Number(item.quantity) || 0;
            const price = Number(item.price) || 0;
            const lineTotal = qty * price;
            rawTotal += lineTotal;

            const tr = document.createElement('tr');
            tr.className = "border-b border-gray-200 hover:bg-gray-50";
            
            let nameHtml = `<div class="font-medium text-gray-800">${item.name || '未命名項目'}</div>`;
            if (item.model) {
                nameHtml += `<div class="text-xs text-gray-500 mt-1">規格/型號: ${item.model}</div>`;
            }

            tr.innerHTML = `
                <td class="py-4 px-4 text-center text-gray-500">${index + 1}</td>
                <td class="py-4 px-4">${nameHtml}</td>
                <td class="py-4 px-4 text-right text-gray-800">${qty}</td>
                <td class="py-4 px-4 text-center text-gray-800">${item.unit}</td>
                <td class="py-4 px-4 text-right text-gray-800">${price.toLocaleString()}</td>
                <td class="py-4 px-4 text-right font-medium text-gray-800">${lineTotal.toLocaleString()}</td>
            `;
            tbody.appendChild(tr);
        });

        // 稅額計算
        const subtotal = state.meta.hasTax ? Math.round(rawTotal / 1.05) : rawTotal;
        const tax = state.meta.hasTax ? rawTotal - subtotal : 0;
        const total = rawTotal;

        document.getElementById('preview-subtotal').textContent = `NT$ ${subtotal.toLocaleString()}`;
        document.getElementById('preview-tax').textContent = `NT$ ${tax.toLocaleString()}`;
        document.getElementById('preview-total').textContent = `NT$ ${total.toLocaleString()}`;
        
        const taxRow = document.getElementById('preview-tax-row');
        if (state.meta.hasTax) {
            taxRow.style.display = 'flex';
        } else {
            taxRow.style.display = 'none';
        }
    }

    // --- 匯出圖片邏輯 ---
    document.getElementById('btnExport').addEventListener('click', async () => {
        const btn = document.getElementById('btnExport');
        const textSpan = document.getElementById('exportText');
        
        if (!window.html2canvas) {
            alert("載入截圖工具中，請稍候再試...");
            return;
        }
        
        btn.disabled = true;
        btn.classList.replace('bg-blue-600', 'bg-gray-400');
        btn.classList.replace('hover:bg-blue-700', 'cursor-not-allowed');
        textSpan.textContent = '生成中...';

        try {
            const element = document.getElementById('quotation-preview');
            const canvas = await window.html2canvas(element, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff'
            });
            
            const dataUrl = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            const fileNameCompany = state.buyer.company || '客戶';
            link.download = `報價單_${state.meta.quoteNumber}_${fileNameCompany}.png`;
            link.href = dataUrl;
            link.click();
        } catch (error) {
            console.error('輸出圖片失敗:', error);
            alert('輸出圖片失敗，請檢查瀏覽器設定。');
        } finally {
            btn.disabled = false;
            btn.classList.replace('bg-gray-400', 'bg-blue-600');
            btn.classList.replace('cursor-not-allowed', 'hover:bg-blue-700');
            textSpan.textContent = '輸出圖片';
        }
    });

    // 初始化
    renderItemsEditor();
    renderPreview();

</script>

</body>
</html>
